<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#17182a" />
  <title>のっかれボールズ v0.2.3</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app">
    <section class="topbar" aria-label="ゲーム情報">
      <div class="brand">
        <span class="logo-dot"></span>
        <div>
          <p class="eyebrow">スマホ対戦プロトタイプ</p>
          <h1>のっかれボールズ</h1>
        </div>
      </div>

      <div class="settings" aria-label="ルール設定">
        <label>
          <span>TIME</span>
          <select id="timeSelect">
            <option value="30">30</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
            <option value="inf">∞</option>
          </select>
        </label>
        <label>
          <span>STOCK</span>
          <select id="stockSelect">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5">5</option>
          </select>
        </label>
        <button id="resetButton" type="button" class="mini-button">リセット</button>
      </div>

      <div class="hud">
        <div class="hud-card">
          <span>TIME</span>
          <strong id="timeLabel">60</strong>
        </div>
        <div class="hud-card p1">
          <span>RED</span>
          <strong id="p1State">READY</strong>
        </div>
        <div class="hud-card p2">
          <span>BLUE</span>
          <strong id="p2State">READY</strong>
        </div>
      </div>
    </section>

    <section class="pad-row pad-row-top p1" aria-label="1Pスマホ操作">
      <p>1P RED</p>
      <div id="joy1" class="joystick" data-player="0">
        <span class="stick"></span>
      </div>
      <p class="hint">上側スティック</p>
    </section>

    <section class="stage-wrap">
      <canvas id="gameCanvas" width="1000" height="1000" aria-label="ゲーム画面"></canvas>
      <div id="message" class="message">
        <h2>のっかれ！</h2>
        <p>上下のスティックを倒して、相手を場外へ弾き出せ！</p>
        <button id="startButton" type="button">スタート</button>
      </div>
    </section>

    <section class="pad-row pad-row-bottom p2" aria-label="2Pスマホ操作">
      <p>2P BLUE</p>
      <div id="joy2" class="joystick" data-player="1">
        <span class="stick"></span>
      </div>
      <p class="hint">PC: 1P WASD / 2P 矢印キー</p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
